<!DOCTYPE html>
<html>
<head>
  <title>StudySync</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="icon.png">
</head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef3ff;
      margin: 0;
      padding: 0;
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-insert-bottom);
      min-height:100vh;
      overflow-x:hidden;
      overflow-y: auto;
    }

    header {
      background: #1f4ed8;
      color: white;
      text-align:center;
      padding:25px 15px;
    }
    header h1{
      font-size:32px;
    }
    header p{
      font-size:18px;
    }

    .container {
      width:95%;
      max-width:500px;
      margin:auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      box-sizing:border-box;
    }

    input, select, button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size:17px;
    }

    button {
      background: #1f4ed8;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #163bb0;
    }

    .task {
      width:100%;
      margin-bottom:15px;
      background: #f3f6ff;
      padding: 15px;
      margin: 10px 0;
      border-left: 5px solid #1f4ed8;
      border-radius: 12px;
      box-sizing: border-box;
    }

    .share {
      background: #e8fff0;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h1>StudySync</h1>
  <p>Assignment, Exam and Reminder Tracker</p>
</header>

<div class="container">
  <h2>Add New Task</h2>

  <select id="taskType">
    <option value="Assignment">Assignment</option>
    <option value="Exam">Exam</option>
    <option value="Reminder">Reminder</option>
  </select>

  <input type="text" id="title" placeholder="Task title">
  <input type="text" id="subject" placeholder="Subject">
  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="addTask()">Save Task</button>
  <button onclick="showUpcoming()">Check Upcoming Deadlines</button>
  <button onclick="shareApp()">Share App</button>

  <div class="share" id="shareBox">
    <b>Share this app link:</b>
    <p id="shareLink"></p>
  </div>

  <h2>Saved Tasks</h2>
  <div id="taskList"></div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  if ("Notification" in window) {
    Notification.requestPermission();
  }

  function addTask() {
    let type = document.getElementById("taskType").value;
    let title = document.getElementById("title").value;
    let subject = document.getElementById("subject").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    if (title === "" || date === "" || time === "") {
      alert("Please fill in the task title, date, and time.");
      return;
    }

    let task = {
      type: type,
      title: title,
      subject: subject,
      date: date,
      time: time
    };

    tasks.push(task);
    localStorage.setItem("tasks", JSON.stringify(tasks));

    alert(type + " saved successfully");

    clearInputs();
    displayTasks();
    sendNotification(task);
  }

  function displayTasks() {
    let taskList = document.getElementById("taskList");
    taskList.innerHTML = "";

    if (tasks.length === 0) {
      taskList.innerHTML = "<p>No tasks available.</p>";
      return;
    }

    tasks.forEach(function(task) {
      taskList.innerHTML += `
        <div class="task">
          <h3>${task.type}: ${task.title}</h3>
          <p><b>Subject:</b> ${task.subject}</p>
          <p><b>Date:</b> ${task.date}</p>
          <p><b>Time:</b> ${task.time}</p>
        </div>
      `;
    });
  }

  function showUpcoming() {
    tasks.sort(function(a, b) {
      return new Date(a.date + " " + a.time) - new Date(b.date + " " + b.time);
    });

    displayTasks();
    alert("Upcoming deadlines are now shown first.");
  }

  function sendNotification(task) {
    if ("Notification" in window && Notification.permission === "granted") {
      new Notification("StudySync Reminder", {
        body: task.type + ": " + task.title + " is saved for " + task.date + " at " + task.time
      });
    }
  }

  function shareApp() {
    let link = window.location.href;
    document.getElementById("shareBox").style.display = "block";
    document.getElementById("shareLink").innerText = link;

    if (navigator.share) {
      navigator.share({
        title: "StudySync",
        text: "Use this app to track assignments, exams and reminders.",
        url: link
      });
    }
  }

  function clearInputs() {
    document.getElementById("title").value = "";
    document.getElementById("subject").value = "";
    document.getElementById("date").value = "";
    document.getElementById("time").value = "";
  }

  displayTasks();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
if ('serviceWorker' in navigator) {

    navigator.serviceWorker.register("service-worker.js")

    .then(() => {

        console.log("StudySync installed.");

    });

}
</script>

</body>
</html>
